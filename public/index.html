<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 在线预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
    }
    .panel:last-child {
      border-right: none;
    }
    .panel-header {
      padding: 12px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      font-weight: 600;
      font-size: 14px;
      color: #333;
    }
    #editor {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      padding: 16px;
      font-size: 14px;
      font-family: "Monaco", "Menlo", "Consolas", monospace;
      line-height: 1.6;
      resize: none;
    }
    #preview {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <div class="panel-header">Markdown 编辑</div>
      <textarea id="editor" placeholder="在此输入 Markdown 文本..."></textarea>
    </div>
    <div class="panel">
      <div class="panel-header">预览</div>
      <iframe id="preview" title="preview"></iframe>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
